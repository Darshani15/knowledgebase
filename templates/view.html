<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>View Solution</title>
<style>
    body { font-family: Arial; background:#eef2f7; margin:0; padding:0; }

    .header {
        background:#2c3e50;
        color:white;
        padding:20px;
        text-align:center;
    }

    .container {
        max-width:800px;
        margin:50px auto;
        padding:30px;
        background:white;
        border-radius:10px;
        box-shadow:0 0 15px gray;
    }

    h2 { color:#2c3e50; }

    .solution-box {
        background:#f4f8fb;
        padding:15px;
        border-radius:8px;
        margin-top:15px;
    }

    .back {
        display:block;
        margin-top:25px;
        text-decoration:none;
        color:#3498db;
        font-weight:bold;
    }

    .back:hover { color:#2980b9; }
</style>
</head>
<body>

<div class="header">
    <h2>Solution Details</h2>
</div>

<div class="container">
    <h2>{{ data.title }}</h2>

    <p><strong>Description:</strong> {{ data.description }}</p>

    <div class="solution-box">
        <strong>Solution:</strong>
        <p>{{ data.solution }}</p>
    </div>

    <a href="/" class="back">⬅ Back to Home</a>
</div>

</body>
</html>
